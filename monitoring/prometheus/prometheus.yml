global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    env: lab

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090
        labels:
          service: observability
          env: lab

  - job_name: demo-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - demo-api:8000
        labels:
          service: demo-api
          env: lab

  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100
        labels:
          service: node
          env: lab
