server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: demo-api-file
    static_configs:
      - targets:
          - localhost
        labels:
          job: demo-api
          service: demo-api
          env: lab
          __path__: /var/log/app/access.jsonl
    pipeline_stages:
      - json:
          expressions:
            status: status
            latency_ms: latency_ms
            route: route
            method: method
